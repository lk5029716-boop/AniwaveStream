name: Build Debug APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --console=plain > /tmp/build.log 2>&1

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/*.apk

      # Diagnostics: post the real compiler output as a commit comment so it is
      # readable via the API (Actions logs are not public). Temporary.
      - name: Post build log to commit
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### CI assembleDebug log (tail)"
            echo '```'
            tail -200 /tmp/build.log
            echo '```'
          } > /tmp/comment.md
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" -f body="$(cat /tmp/comment.md)" \
            && echo "comment posted" || echo "comment post FAILED"

      - name: Publish APK to nightly release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-apk
          name: Nightly Debug APK
          body: "Auto-built debug APK from player-force-close-fix. Install to preview the Anivave design port."
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
